name: Build iOS (Simulator)

# Ongoing verification that the iOS app still compiles, on the free public-repo
# macOS runner. Unsigned Simulator build - no Apple account needed. Runs when the
# iOS project, web assets, or Capacitor config change, plus on demand. The signed
# IPA / TestFlight pipeline is a separate, later workflow (needs the Apple account).
on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - 'www/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Copies www/ into the (gitignored) native assets dir and resolves native deps.
      - name: Sync web assets into the iOS project
        run: npx cap sync ios

      - name: Build for the iOS Simulator (no signing)
        run: |
          if [ -d ios/App/App.xcworkspace ]; then
            CONTAINER=(-workspace ios/App/App.xcworkspace)
          else
            CONTAINER=(-project ios/App/App.xcodeproj)
          fi
          echo "Building with: ${CONTAINER[*]}"
          xcodebuild \
            "${CONTAINER[@]}" \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
