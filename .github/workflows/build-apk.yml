name: Build and publish APK

# Fires when a release tag is pushed (matching the existing tag-per-release flow:
# bump versionCode/versionName + CHANGELOG, commit, tag vX.Y.Z). The tag build
# produces a signed APK and attaches it to that tag's GitHub Release, so releases
# self-publish an installable download. Also runnable manually for testing.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write # required to create/attach the GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync web assets into the Android project
        run: npx cap sync android

      # The release signing config only activates when android/key.properties exists
      # (see android/app/build.gradle). Both the keystore and its passwords live only
      # in repo secrets - never in git - and are reconstructed here at build time. Must
      # be the SAME keystore the app was first signed with, or updates won't install
      # over an existing install (Android rejects a signature change).
      - name: Reconstruct signing config from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          cat > android/key.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Name the APK after the version
        id: apk
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp android/app/build/outputs/apk/release/app-release.apk "nightlight-${VERSION}.apk"
          echo "path=nightlight-${VERSION}.apk" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # Pull the matching section out of CHANGELOG.md for the release notes body.
      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { grab = 1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "APK build for ${GITHUB_REF_NAME}." > release-notes.md
          fi

      - name: Publish GitHub Release with the APK attached
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.apk.outputs.version }}
          body_path: release-notes.md
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
