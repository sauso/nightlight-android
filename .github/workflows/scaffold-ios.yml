name: Scaffold iOS project

# One-time bootstrap (manual trigger). Capacitor's `cap add ios` and CocoaPods are
# macOS-only, so this runs on a free public-repo macOS runner: it generates the
# native ios/ project, proves it compiles for the Simulator (no signing needed),
# and commits ios/ back to the repo. After this succeeds once, ongoing Simulator
# builds move to a separate build-ios workflow.
on:
  workflow_dispatch: {}

permissions:
  contents: write # to commit the generated ios/ project back to the repo

jobs:
  scaffold:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Add the iOS platform
        run: npx cap add ios

      - name: Sync web assets + native deps into the iOS project
        run: npx cap sync ios

      - name: Show generated iOS project structure
        run: |
          echo "=== ios/App ==="
          ls -la ios/App || true
          echo "=== key files (workspace / project / Podfile / Package.swift) ==="
          find ios -maxdepth 3 \( -name "*.xcworkspace" -o -name "*.xcodeproj" -o -name "Podfile" -o -name "Package.swift" \) || true

      # Recent Capacitor iOS uses Swift Package Manager (no Podfile / no .xcworkspace)
      # and is built straight from App.xcodeproj. Only run pod install if a Podfile
      # was actually generated, so this works under either dependency manager.
      - name: Install CocoaPods dependencies (only if a Podfile exists)
        run: |
          if [ -f ios/App/Podfile ]; then
            echo "Podfile found - running pod install"
            (cd ios/App && pod install)
          else
            echo "No Podfile - Swift Package Manager project, skipping pod install"
          fi

      - name: Build for the iOS Simulator (no signing)
        run: |
          if [ -d ios/App/App.xcworkspace ]; then
            CONTAINER=(-workspace ios/App/App.xcworkspace)
          else
            CONTAINER=(-project ios/App/App.xcodeproj)
          fi
          echo "Building with: ${CONTAINER[*]}"
          xcodebuild \
            "${CONTAINER[@]}" \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Commit the generated ios/ project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ios
          if git diff --cached --quiet; then
            echo "No ios/ changes to commit."
          else
            git commit -m "Scaffold iOS platform (generated by cap add ios)"
            git push
          fi
