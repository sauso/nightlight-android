<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Nightlight</title>
<style>
  :root {
    --bg: #12172b;
    --text-primary: #edeef5;
    --text-secondary: #8a8fb0;
    --accent: #f5d9a8;
    --border: rgba(245, 217, 168, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: radial-gradient(ellipse at top, #171d38 0%, var(--bg) 55%);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card { width: 100%; max-width: 380px; text-align: center; }
  .moon { font-size: 56px; line-height: 1; margin-bottom: 14px; }
  h1 {
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    font-weight: 600;
    font-size: 24px;
    margin: 0 0 8px;
  }
  p { color: var(--text-secondary); font-size: 14px; margin: 0 0 28px; line-height: 1.5; }
  button {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .primary { background: var(--accent); color: #21170a; }
  .secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-primary);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="moon">🌙</div>
    <h1>Can't reach your server</h1>
    <p>Nightlight couldn't connect to your server. It may be offline, or this device may
       not have a connection to it right now.</p>
    <button class="primary" id="retry">Try again</button>
    <button class="secondary" id="change">Use a different server</button>
  </div>

<script>
  const plugin = () => window.Capacitor?.Plugins?.ServerConfig;

  document.getElementById('retry').addEventListener('click', async () => {
    // Rebuilds the bridge against the still-saved address.
    await plugin()?.restart();
  });

  document.getElementById('change').addEventListener('click', async () => {
    const p = plugin();
    if (!p) return;
    // Cleared address -> the restarted bridge boots into the setup page.
    await p.clear();
    await p.restart();
  });
</script>
</body>
</html>
