<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Nightlight</title>
<style>
  /* Mirrors the main app's theme (frontend/src/index.css in the nightlight repo) so
     first-run doesn't look like a different product. */
  :root {
    --bg: #12172b;
    --bg-elevated-2: #242c52;
    --text-primary: #edeef5;
    --text-secondary: #8a8fb0;
    --accent: #f5d9a8;
    --offline: #e08585;
    --border: rgba(245, 217, 168, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: radial-gradient(ellipse at top, #171d38 0%, var(--bg) 55%);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    padding-top: calc(24px + env(safe-area-inset-top));
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
  }
  .card { width: 100%; max-width: 380px; text-align: center; }
  /* Same treatment as the web app's login screen (.auth-icon / .auth-card in
     frontend/src/index.css) so first-run looks like the same product. */
  .app-icon {
    display: block;
    width: 84px;
    height: 84px;
    margin: 0 auto 18px;
    border-radius: 22px;
    box-shadow: 0 8px 30px rgba(245, 217, 168, 0.18);
  }
  h1 {
    font-family: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0 0 6px;
  }
  .tagline { color: var(--text-secondary); font-size: 13px; margin: 0 0 26px; }
  label {
    display: block;
    text-align: left;
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: var(--bg-elevated-2);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 15px;
  }
  input:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
  .hint { text-align: left; font-size: 12px; color: var(--text-secondary); margin: 8px 0 22px; }
  button {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    background: var(--accent);
    color: #21170a;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; }
  .error {
    display: none;
    background: rgba(224, 133, 133, 0.12);
    border: 1px solid rgba(224, 133, 133, 0.4);
    color: var(--offline);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 16px;
    text-align: left;
  }
</style>
</head>
<body>
  <div class="card">
    <img src="icon-192.png" alt="" class="app-icon" />
    <h1>Nightlight</h1>
    <p class="tagline">Connect to your server to watch over the nursery.</p>

    <label for="server">Server address</label>
    <input id="server" type="url" inputmode="url" autocapitalize="none" autocorrect="off"
           spellcheck="false" placeholder="nightlight.example.com" autofocus />
    <p class="hint">The same address you use in your browser — a domain or IP address, e.g. 192.168.1.50:4000.</p>

    <button id="connect">Connect</button>
    <div id="error" class="error"></div>
  </div>

<script>
  const input = document.getElementById('server');
  const button = document.getElementById('connect');
  const errorBox = document.getElementById('error');

  function showError(message) {
    errorBox.textContent = message;
    errorBox.style.display = 'block';
  }

  async function connect() {
    const plugin = window.Capacitor?.Plugins?.ServerConfig;
    if (!plugin) {
      showError('Native bridge unavailable - try reinstalling the app.');
      return;
    }
    errorBox.style.display = 'none';
    button.disabled = true;
    button.textContent = 'Connecting…';
    try {
      // save() validates the address actually hosts a Nightlight server before
      // persisting; restart() then rebuilds the bridge pointed at it.
      await plugin.save({ url: input.value });
      button.textContent = 'Connected';
      await plugin.restart();
    } catch (err) {
      showError(err?.message || 'Could not connect to that address.');
      button.disabled = false;
      button.textContent = 'Connect';
    }
  }

  button.addEventListener('click', connect);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') connect();
  });
</script>
</body>
</html>
